name: 商品バッチ（対応済み切り口を取得）
run-name: 商品バッチ / ${{ github.event_name == 'workflow_dispatch' && inputs.mode || '定期実行' }}


# 手動実行（Actions画面の「Run workflow」ボタン）。誰でも押せる＝個人Mac不要。
# 最新カタログは Supabase から読むので、ここではカタログ生成しない（生成は catalog.yml）。
# 定期実行したい場合は schedule のコメントを外す（cronはUTC）。
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "影テスト（保存なし）か、合格候補の正式反映か"
        required: true
        default: shadow
        type: choice
        options:
          - shadow
          - promote
      target:
        description: "1切り口だけ試す場合の対象（テーマ|切り口）。空欄なら直近順"
        required: false
        default: ""
        type: string
  schedule:
    - cron: "*/30 * * * *"   # 30分おきに自動実行（対応済み切り口を取得。手動ボタンも残す）


# 実行中の一時トークンは、成果物の読み取りだけに限定する。
permissions:
  contents: read
  actions: read


concurrency:
  group: products-batch
  cancel-in-progress: false


jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Tokyo
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      QUALITY_REPORT_PATH: product/quality_events.jsonl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: 直近の影テスト結果を取得（正式反映時のみ・再検索しない）
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'promote'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 product/download_shadow.py


      - name: 鍵ファイルを Secrets から生成（機密はログに出さない）
        env:
          RAKUTEN_APP_ID:        ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY:    ${{ secrets.RAKUTEN_ACCESS_KEY }}
          YAHOO_CLIENT_ID:       ${{ secrets.YAHOO_CLIENT_ID }}
          AMZ_CREDENTIAL_ID:     ${{ secrets.AMZ_CREDENTIAL_ID }}
          AMZ_CREDENTIAL_SECRET: ${{ secrets.AMZ_CREDENTIAL_SECRET }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          BATCH_TOKEN:           ${{ secrets.BATCH_TOKEN }}
          AMZ_PARTNER_TAG:       ${{ secrets.AMZ_PARTNER_TAG }}
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
        run: |
          python3 - <<'PY'
          import os, json, pathlib
          pathlib.Path("product").mkdir(exist_ok=True)
          pathlib.Path("sources").mkdir(exist_ok=True)
          json.dump({
            "rakuten_application_id": os.environ["RAKUTEN_APP_ID"],
            "rakuten_access_key":     os.environ["RAKUTEN_ACCESS_KEY"],
            "yahoo_client_id":        os.environ["YAHOO_CLIENT_ID"],
          }, open("product/shopping_api.json","w"))
          json.dump({
            "credential_id":     os.environ["AMZ_CREDENTIAL_ID"],
            "credential_secret": os.environ["AMZ_CREDENTIAL_SECRET"],
            "partner_tag":  os.environ["AMZ_PARTNER_TAG"],
            "marketplace":  "www.amazon.co.jp",
            "token_url":    "https://api.amazon.com/auth/o2/token",
            "scope":        "creatorsapi::default",
            "api_url":      "https://creatorsapi.amazon/catalog/v1/getItems",
          }, open("product/amazon_creators.json","w"))
          json.dump({
            "api_key":     os.environ["GEMINI_API_KEY"],
            "model":       "gemini-flash-lite-latest",
            "daily_limit": 950,
          }, open("product/gemini_api.json","w"))
          open("sources/service_key.txt","w").write(os.environ["BATCH_TOKEN"] + "\n")
          print("config written")
          PY
      - name: 学習を更新（承認・👍👎 → learning.json）
        run: python3 product/learn.py


      - name: 対応済み切り口の商品を取得（→ v2_product）
        env:
          FETCH_TARGET: ${{ github.event.inputs.target || '' }}
          PROMOTE_MIN_COUNT: ${{ github.event.inputs.target == 'カーテン|遮熱で選ぶ定番カーテン' && '3' || '4' }}
          PROMOTE_MIN_SCORE: ${{ github.event.inputs.target == 'カーテン|遮熱で選ぶ定番カーテン' && '90' || '80' }}
          PROMOTE_AVG_SCORE: ${{ github.event.inputs.target == 'カーテン|遮熱で選ぶ定番カーテン' && '90' || '85' }}
        run: |
          rm -f product/quality_events.jsonl product/quality_report.md
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.mode }}" = "promote" ]; then
            python3 product/fetch_claimed.py --rerank --limit 40 --promote-quality --confirm-promote --snapshot-file product/shadow_results.json
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python3 product/fetch_claimed.py --rerank --limit 40 --shadow --snapshot-out product/shadow_results.json
          else
            python3 product/fetch_claimed.py --rerank --limit 40
          fi
      - name: 品質レポートを作成（件数・AI点数・保留理由）
        if: always()
        run: |
          python3 product/quality_report.py --events product/quality_events.jsonl --out product/quality_report.md
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ] && [ -f product/quality_report.md ]; then
            cat product/quality_report.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: 品質レポートを保存（手動実行の確認用・7日で自動削除）
        if: always() && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: |
            product/quality_report.md
            product/quality_events.jsonl
          if-no-files-found: warn
          retention-days: 7


      - name: 影テスト結果を保存（正式反映用・7日で自動削除）
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'shadow'
        uses: actions/upload-artifact@v4
        with:
          name: shadow-results
          path: product/shadow_results.json
          if-no-files-found: error
          retention-days: 7


      - name: 後片付け（鍵ファイルを消す）
        if: always()
        run: rm -f product/shopping_api.json product/amazon_creators.json product/gemini_api.json sources/service_key.txt
